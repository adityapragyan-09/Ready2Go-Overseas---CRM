# ─────────────────────────────────────────────────────
# Ready2Go CRM — Production Docker Compose
# ─────────────────────────────────────────────────────

version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ready2go-crm
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
    volumes:
      - uploads_data:/app/uploads
    networks:
      - crm-network
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; port = os.environ.get('PORT', '8000'); urllib.request.urlopen(f'http://localhost:{port}/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Optional: Nginx reverse proxy ──────────────
  nginx:
    image: nginx:alpine
    container_name: ready2go-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - crm-network

volumes:
  uploads_data:
    driver: local

networks:
  crm-network:
    driver: bridge
