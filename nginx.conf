# ─────────────────────────────────────────────────────
# Ready2Go CRM — Nginx Production Configuration
# ─────────────────────────────────────────────────────

events {
    worker_connections 1024;
    multi_accept on;
    use epoll;
}

http {
    # ── Basic Settings ──────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 500M;

    # ── MIME Types ──────────────────────────────────
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ─────────────────────────────────────
    log_format json escape=json
        '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"referrer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"x_forwarded_for":"$http_x_forwarded_for"'
        '}';

    access_log /var/log/nginx/access.log json;
    error_log /var/log/nginx/error.log warn;

    # ── Rate Limiting ───────────────────────────────
    limit_req_zone $binary_remote_addr zone=crm_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # ── Gzip ────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Upstream Backend ─────────────────────────────
    upstream crm_backend {
        server app:8000;
        keepalive 32;
    }

    # ── HTTP Server (Redirect to HTTPS) ─────────────
    server {
        listen 80 default_server;
        server_name _;

        # Redirect all HTTP to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }

    # ── HTTPS Server ─────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL (configure with real certificates)
        # ssl_certificate /etc/nginx/ssl/cert.pem;
        # ssl_certificate_key /etc/nginx/ssl/key.pem;
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        # ssl_prefer_server_ciphers on;
        # ssl_session_cache shared:SSL:10m;
        # ssl_session_timeout 10m;

        # ── Security Headers ─────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ── Frontend Static Files ────────────────────
        location / {
            root /app/frontend/dist;
            index index.html;
            try_files $uri $uri/ /index.html;
            expires 1y;
            add_header Cache-Control "public, immutable";

            # Rate limiting
            limit_req zone=crm_limit burst=20 nodelay;
        }

        # ── API Proxy ────────────────────────────────
        location /api/ {
            proxy_pass http://crm_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;

            # Rate limiting
            limit_req zone=crm_limit burst=20 nodelay;
        }

        # ── Docs (disabled in production by backend) ─
        location /docs {
            deny all;
        }

        location /redoc {
            deny all;
        }

        # ── Health Check (no rate limit) ─────────────
        location /health {
            proxy_pass http://crm_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;
        }

        location /ready {
            proxy_pass http://crm_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }

        location /live {
            return 200 "alive";
            access_log off;
        }

        # ── Uploaded Files (local dev only) ──────────
        location /uploads/ {
            internal;  # Only accessible via internal redirects
            alias /app/uploads/;
        }
    }
}
